services:

  backend:
    build: ./backend

    container_name: flask-backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - postgres

    restart: always

    networks:
      - project-network

  postgres:
    image: postgres:15

    container_name: postgres-db

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: always

    networks:
      - project-network

volumes:

  postgres-data:

networks:

  project-network: