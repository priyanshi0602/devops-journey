services:

  nginx:
    build: ./nginx

    container_name: nginx-server

    ports:
      - "8080:80"

    depends_on:
      - backend

    restart: always

    networks:
      - project-network

  backend:
    build: ./backend

    container_name: flask-backend

    env_file:
      - .env

    depends_on:
      - postgres

    restart: always

    networks:
      - project-network

  postgres:
    image: postgres:15

    container_name: postgres-db

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: always

    networks:
      - project-network

volumes:

  postgres-data:

networks:

  project-network: